<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tân Phú APG — Kết quả khứ hồi (Desktop)</title>
<link rel="stylesheet" href="../../mobile/screens/app.css" />
<link rel="stylesheet" href="../app-desktop.css" />
<style>
  .summarybar{position:sticky;top:56px;z-index:25;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--apg-hairline);}
  .summarybar .in{max-width:1320px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;gap:18px;}
  .sb-route{display:flex;align-items:center;gap:10px;background:var(--apg-bg-surface);border:1px solid var(--apg-hairline);border-radius:980px;padding:9px 16px;cursor:pointer;}
  .sb-route .r{font-size:15px;font-weight:600;}.sb-route .m{font-size:12px;color:var(--apg-text-secondary);}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .leg-col .lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .leg-col .lh .t{font-size:16px;font-weight:600;}
  .leg-col .lh .t small{color:var(--apg-text-secondary);font-weight:400;font-size:13px;}
  .fcard.rt{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:14px 16px;}
  .fcard.rt .top{margin:0;}
  .fcard.rt .timeline{margin:0;}
  .fcard.rt .ep .t{font-size:18px;}
  .fcard.rt .pc{text-align:right;}
  .fcard.rt .pc .price{font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;}
  .fcard.rt.sel{outline:2px solid var(--apg-blue-500);background:var(--apg-blue-50);}
  /* selection bottom bar */
  .selbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--apg-hairline);transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
  .selbar.show{transform:translateY(0);}
  .selbar .in{max-width:1320px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:24px;}
  .selbar .leg{font-size:14px;}.selbar .leg .k{font-size:12px;color:var(--apg-text-tertiary);}
  .selbar .tot{margin-left:auto;text-align:right;}
  .selbar .tot .k{font-size:12px;color:var(--apg-text-tertiary);}
  .selbar .tot .v{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--apg-blue-600);}
  .pair{background:var(--apg-bg-surface);border-radius:var(--apg-radius-lg);box-shadow:var(--apg-shadow-xs);margin-bottom:12px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr auto;align-items:center;}
  .pair .leg2{display:flex;align-items:center;gap:12px;padding:16px;}
  .pair .leg2+.leg2{border-left:1px dashed var(--apg-hairline);}
  .pair .dir{font-size:11px;font-weight:600;color:var(--apg-text-tertiary);}
  .pair .tt{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;}
  .pair .ss{font-size:12px;color:var(--apg-text-tertiary);}
  .pair .pc{padding:16px 20px;text-align:right;border-left:1px solid var(--apg-hairline);}
  .pair .pc .price{font-size:19px;font-weight:600;color:var(--apg-blue-600);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
  <div class="topnav"><div class="in"><a class="brand" href="../index.html"><img src="../../mobile/assets/logo-appicon.png" alt="" /> Tân Phú APG</a><nav><a class="on" href="home.html">Tìm vé</a><a href="quote.html">Báo giá</a><a href="#">Tra cứu đặt chỗ</a><a href="admin-dashboard.html">Quản trị</a></nav><div class="right"><span class="airmono" style="background:var(--apg-blue-500)">QT</span></div></div></div>

  <div class="summarybar"><div class="in">
    <div class="sb-route" onclick="location.href='home.html'"><div><div class="r">HAN ⇄ SGN · Khứ hồi</div><div class="m">6 Th8 → 10 Th8 · 1 khách · Phổ thông</div></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--apg-text-muted)" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div>
    <div class="seg" style="width:240px;margin-left:auto;"><button class="on" onclick="setView('split')">Tách chiều</button><button onclick="setView('pair')">Theo cặp</button></div>
  </div></div>

  <div class="results-shell" style="grid-template-columns:264px minmax(0,1fr);">
    <aside class="rail-left">
      <div class="filtercard">
        <div class="fh">Bộ lọc</div>
        <div class="fg"><div class="fglabel">Điểm dừng</div><div class="fgchips"><button class="chip on">Bay thẳng</button><button class="chip">Tất cả</button></div></div>
        <div class="fg"><div class="fglabel">Khung giờ đi</div><div class="fgchips"><button class="chip on">Tất cả</button><button class="chip">Sáng</button><button class="chip">Chiều</button><button class="chip">Tối</button></div></div>
        <div class="fg"><div class="fglabel">Hãng</div><div class="fgchips"><button class="chip on">Tất cả</button><button class="chip">VN</button><button class="chip">VJ</button><button class="chip">QH</button></div></div>
      </div>
    </aside>

    <main style="padding-bottom:90px;">
      <div class="stream" id="streamBanner" style="margin:0 0 14px;"><span class="dots"><i></i><i></i><i></i></span><span class="txt" style="flex:1;">Đang ghép cặp · đã có 8 cặp từ 4 nguồn…</span><span class="pbar" style="max-width:140px;"><i style="width:70%"></i></span></div>

      <!-- SPLIT VIEW (2 columns) -->
      <div id="splitView" class="split">
        <div class="leg-col">
          <div class="lh"><div class="t">Chiều đi <small>· 6 Th8</small></div><div class="sortseg"><button class="on">Giá ↑</button><button>Giờ đi</button></div></div>
          <div id="outList"></div>
        </div>
        <div class="leg-col">
          <div class="lh"><div class="t">Chiều về <small>· 10 Th8</small></div><div class="sortseg"><button class="on">Giá ↑</button><button>Giờ đi</button></div></div>
          <div id="inList"></div>
        </div>
      </div>

      <!-- PAIR VIEW -->
      <div id="pairView" class="hide">
        <div style="font-size:14px;color:var(--apg-text-secondary);margin-bottom:12px;"><b>14</b> cặp vé · neo theo chiều đi rẻ nhất</div>
        <div id="pairList"></div>
      </div>
    </main>
  </div>

  <!-- SELECTION BAR -->
  <div class="selbar" id="selbar"><div class="in">
    <div class="leg"><div class="k">Chiều đi</div><div id="selOut">—</div></div>
    <div class="leg"><div class="k">Chiều về</div><div id="selIn">—</div></div>
    <div class="tot"><div class="k">Tổng cặp · 1 khách</div><div class="v" id="selTot">—</div></div>
    <button class="btn fill wauto" id="selGo" onclick="location.href='quote.html'" style="padding:0 28px;">Tiếp tục báo giá</button>
  </div></div>

<script>
  const ACOL={VN:'#1a3a6b',VJ:'#e30613',QH:'#1f7a4d'};
  const alogo=(c)=>`<span class="airmono" style="background:${ACOL[c]||'#0a74c0'}">${c}</span>`;
  const fmt=n=>n.toLocaleString('vi-VN');
  const OUT=[{code:'VJ',name:'VietJet Air',no:'VJ139',dep:'08:15',arr:'10:25',dur:'2g 10m',price:1890000},{code:'VN',name:'Vietnam Airlines',no:'VN213',dep:'07:05',arr:'09:20',dur:'1g 25m',price:2450000},{code:'QH',name:'Bamboo Airways',no:'QH202',dep:'09:40',arr:'11:50',dur:'2g 10m',price:2150000}];
  const INB=[{code:'VJ',name:'VietJet Air',no:'VJ174',dep:'19:30',arr:'21:40',dur:'2g 10m',price:1750000},{code:'QH',name:'Bamboo Airways',no:'QH215',dep:'13:20',arr:'15:30',dur:'2g 10m',price:1980000},{code:'VN',name:'Vietnam Airlines',no:'VN256',dep:'17:00',arr:'19:15',dur:'2g 15m',price:2380000}];
  const PAIRS=[{o:0,i:0,total:3640000},{o:2,i:1,total:4130000},{o:1,i:2,total:4830000},{o:0,i:1,total:3870000}];
  let sel={out:null,in:null};

  function rowHTML(f,side,i){return `<div class="fcard rt ${sel[side]===i?'sel':''}" onclick="pick('${side}',${i})">
    <div class="top">${alogo(f.code)}</div>
    <div><div style="font-size:13px;font-weight:600;">${f.name}</div><div class="timeline" style="margin-top:4px;"><div class="ep"><div class="t tnum">${f.dep}</div></div><div class="mid"><div class="path"><span class="line"></span><span class="plane"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 16l9-3 9-3-9-3-9-3 2 6z"/></svg></span></div><div class="dur">${f.dur} · bay thẳng</div></div><div class="ep"><div class="t tnum">${f.arr}</div></div></div></div>
    <div class="pc"><div class="price tnum">${fmt(f.price)} ₫</div><div class="mono" style="font-size:11px;color:var(--apg-text-tertiary)">${f.no}</div></div>
  </div>;`.replace(/;$/,'');}
  function pairHTML(p,idx){const o=OUT[p.o],i=INB[p.i];return `<div class="pair" onclick="location.href='quote.html'">
    <div class="leg2">${alogo(o.code)}<div><div class="dir">CHIỀU ĐI</div><div class="tt tnum">${o.dep} → ${o.arr}</div><div class="ss">${o.name} ${o.no}</div></div></div>
    <div class="leg2">${alogo(i.code)}<div><div class="dir">CHIỀU VỀ</div><div class="tt tnum">${i.dep} → ${i.arr}</div><div class="ss">${i.name} ${i.no}</div></div></div>
    <div class="pc"><div class="price tnum">${fmt(p.total)} ₫</div><button class="btn fill sm" style="margin-top:8px;" onclick="event.stopPropagation();location.href='quote.html'">Chọn cặp</button></div>
  </div>`;}
  function renderSplit(){document.getElementById('outList').innerHTML=OUT.map((f,i)=>rowHTML(f,'out',i)).join('');document.getElementById('inList').innerHTML=INB.map((f,i)=>rowHTML(f,'in',i)).join('');}
  function renderPairs(){document.getElementById('pairList').innerHTML=PAIRS.map((p,i)=>pairHTML(p,i)).join('');}
  function pick(side,i){sel[side]=i;renderSplit();updateBar();}
  function updateBar(){const o=sel.out!=null?OUT[sel.out]:null,iv=sel.in!=null?INB[sel.in]:null;const bar=document.getElementById('selbar');if(o||iv)bar.classList.add('show');else bar.classList.remove('show');document.getElementById('selOut').textContent=o?`${o.no} · ${o.dep}→${o.arr}`:'—';document.getElementById('selIn').textContent=iv?`${iv.no} · ${iv.dep}→${iv.arr}`:'—';const tot=(o?o.price:0)+(iv?iv.price:0);document.getElementById('selTot').textContent=(o&&iv)?fmt(tot)+' ₫':'Chọn đủ 2 chiều';document.getElementById('selGo').classList.toggle('disabled',!(o&&iv));}
  function setView(v){document.querySelectorAll('.summarybar .seg button').forEach((b,i)=>b.classList.toggle('on',(i===0)===(v==='split')));document.getElementById('splitView').classList.toggle('hide',v!=='split');document.getElementById('pairView').classList.toggle('hide',v!=='pair');}
  renderSplit();renderPairs();
  setTimeout(()=>document.getElementById('streamBanner').classList.add('hide'),2600);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tân Phú APG — Admin Đăng nhập</title>
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="phone admin" style="justify-content:center;">
  <div class="statusbar"><span>9:41</span><span class="right"><svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="currentColor"/></svg></span></div>

  <div class="screen" style="display:flex;flex-direction:column;justify-content:center;padding:0 24px;">
    <div style="text-align:center;margin-bottom:30px;">
      <img src="../assets/logo-appicon.png" alt="" style="width:76px;height:76px;border-radius:18px;box-shadow:var(--apg-shadow-md);" />
      <h1 style="font-size:26px;font-weight:600;letter-spacing:-0.02em;margin-top:18px;">Bảng quản trị</h1>
      <p class="muted" style="font-size:15px;margin-top:4px;">Tân Phú APG · Đăng nhập nội bộ</p>
    </div>

    <div class="fsec" style="margin:0;">
      <div style="margin-bottom:14px;"><label class="lbl">Email</label><input class="input" type="email" value="admin@tanphuapg.vn" /></div>
      <div><label class="lbl">Mật khẩu</label><input class="input err" type="password" value="••••••••" /></div>
      <div class="err-text" id="loginErr">Email hoặc mật khẩu không đúng. Còn 4 lần thử.</div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;color:var(--apg-text-secondary);cursor:pointer;">
        <span class="toggle on" onclick="this.classList.toggle('on')" style="width:44px;height:26px;"><i style="width:22px;height:22px;"></i></span> Ghi nhớ thiết bị
      </label>
      <button class="btn fill" style="margin-top:18px;" onclick="document.getElementById('loginErr').textContent='';location.href='admin-dashboard.html'">Đăng nhập</button>
    </div>

    <p class="muted" style="text-align:center;font-size:12px;margin-top:24px;">Phiên đăng nhập được bảo vệ. Mọi truy cập đều được ghi nhật ký kiểm toán.</p>
  </div>
</div>
<style>.toggle.on i{left:auto;right:2px;}</style>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tân Phú APG — Markup Rules</title>
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="phone admin">
  <div class="statusbar"><span>9:41</span><span class="right"><svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="currentColor"/></svg></span></div>
  <div class="screen pad-cta">
    <div style="padding:14px 16px 0;"><h2 style="font-size:22px;font-weight:600;letter-spacing:-0.02em;">Quy tắc markup</h2><p class="muted" style="font-size:14px;">Áp dụng theo thứ tự ưu tiên từ trên xuống.</p></div>

    <div class="group-label">Đang hoạt động · 3</div>
    <div class="dcard" onclick="openEdit()">
      <div class="dr"><span class="tt">Nội địa tiêu chuẩn</span><span class="sbadge ok">Bật</span></div>
      <div class="dr"><span class="mt">Tuyến nội địa · mọi hãng</span><span class="mt" style="font-weight:600;color:var(--apg-text-primary)">+8%</span></div>
    </div>
    <div class="dcard" onclick="openEdit()">
      <div class="dr"><span class="tt">Quốc tế Đông Bắc Á</span><span class="sbadge ok">Bật</span></div>
      <div class="dr"><span class="mt">ICN/NRT/HND · VN, OZ, KE</span><span class="mt" style="font-weight:600;color:var(--apg-text-primary)">+150.000 ₫</span></div>
    </div>
    <div class="dcard" onclick="openEdit()">
      <div class="dr"><span class="tt">Khuyến mãi VietJet</span><span class="sbadge muted">Tắt</span></div>
      <div class="dr"><span class="mt">VJ · tuyến nội địa</span><span class="mt" style="font-weight:600;color:var(--apg-text-primary)">+5%</span></div>
    </div>
    <div style="height:8px;"></div>
  </div>

  <div class="bottombar"><button class="btn fill" onclick="openEdit()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Tạo quy tắc mới</button></div>

  <div class="sheet-backdrop" id="bd" onclick="closeEdit()"></div>
  <div class="sheet" id="sh">
    <div class="handle"></div>
    <div class="shead"><span class="t">Quy tắc markup</span><button class="x" onclick="closeEdit()">✕</button></div>
    <div class="sbody" style="padding:0 16px;">
      <div style="margin-bottom:14px;"><label class="lbl">Tên quy tắc</label><input class="input" value="Nội địa tiêu chuẩn" /></div>
      <div style="margin-bottom:14px;"><label class="lbl">Phạm vi áp dụng</label><div class="seg"><button class="on">Nội địa</button><button>Quốc tế</button><button>Tất cả</button></div></div>
      <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;"><div><label class="lbl">Hãng (mã)</label><input class="input" placeholder="Bỏ trống = tất cả" /></div><div><label class="lbl">Ưu tiên</label><input class="input" value="10" /></div></div>
      <div style="margin-bottom:14px;"><label class="lbl">Kiểu markup</label><div class="seg"><button class="on">Phần trăm %</button><button>Số tiền ₫</button></div></div>
      <div style="margin-bottom:14px;"><label class="lbl">Giá trị</label><input class="input" value="8" /></div>
      <label style="display:flex;align-items:center;gap:10px;font-size:15px;margin-bottom:8px;"><span class="toggle on" onclick="this.classList.toggle('on')"><i></i></span> Kích hoạt quy tắc</label>
    </div>
    <div class="sfoot" style="display:flex;gap:10px;"><button class="btn ghost wauto" style="flex:1;" onclick="closeEdit()">Hủy</button><button class="btn fill" style="flex:2;" onclick="closeEdit()">Lưu quy tắc</button></div>
  </div>
</div>
<script src="admin-shell.js"></script>
<script>initAdmin('markup-rules','Quy tắc markup');
function openEdit(){sh.classList.add('open');bd.classList.add('open');}
function closeEdit(){sh.classList.remove('open');bd.classList.remove('open');}</script>
</body>
</html>

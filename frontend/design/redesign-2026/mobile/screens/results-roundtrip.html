<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tân Phú APG — Kết quả khứ hồi</title>
<link rel="stylesheet" href="app.css" />
<style>
  .filterbar{position:sticky;top:0;z-index:20;background:rgba(245,245,247,0.92);backdrop-filter:blur(20px);}
  .pair{background:var(--apg-bg-surface);border-radius:var(--apg-radius-lg);box-shadow:var(--apg-shadow-sm);margin:0 16px 12px;overflow:hidden;}
  .pair .leg{display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .pair .leg + .leg{border-top:1px dashed var(--apg-hairline);}
  .pair .dir{font-size:11px;font-weight:600;color:var(--apg-text-tertiary);width:42px;flex:none;text-transform:uppercase;letter-spacing:.03em;}
  .pair .leg .info{flex:1;min-width:0;}
  .pair .leg .tt{font-size:16px;font-weight:600;}
  .pair .leg .tt .tnum{font-variant-numeric:tabular-nums;}
  .pair .leg .ss{font-size:12px;color:var(--apg-text-tertiary);}
  .pair .foot{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--apg-bg-surface-muted);border-top:1px solid var(--apg-hairline);}
  .pair .foot .tlabel{font-size:12px;color:var(--apg-text-secondary);}
  .pair .foot .price{font-size:20px;font-weight:600;letter-spacing:-0.02em;}
  .tabbar{display:flex;gap:0;margin:0 16px 8px;border-bottom:1px solid var(--apg-hairline);}
  .tabbar button{flex:1;border:none;background:transparent;font:inherit;font-size:15px;font-weight:600;color:var(--apg-text-secondary);padding:12px 0;position:relative;cursor:pointer;}
  .tabbar button.on{color:var(--apg-blue-600);}
  .tabbar button.on::after{content:"";position:absolute;left:20%;right:20%;bottom:-1px;height:2.5px;border-radius:2px;background:var(--apg-blue-600);}
  .tabbar button .chk{display:inline-flex;width:18px;height:18px;border-radius:50%;background:var(--apg-success);color:#fff;font-size:11px;align-items:center;justify-content:center;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>
<div class="phone">

  <div class="statusbar">
    <span>9:41</span>
    <span class="right">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="currentColor"/></svg>
    </span>
  </div>

  <div class="appbar">
    <button class="back" onclick="location.href='home.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="searchbar-mini" onclick="location.href='home.html'">
      <div style="flex:1;"><div class="route">HAN ⇄ SGN · Khứ hồi</div><div class="meta">6 Th8 → 10 Th8 · 1 khách</div></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--apg-text-muted)" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
    </div>
  </div>

  <div style="padding:12px 16px 4px;">
    <div class="seg" id="viewSeg">
      <button class="on" onclick="setView('pair')">Theo cặp</button>
      <button onclick="setView('split')">Tách chiều</button>
    </div>
  </div>

  <div class="filterbar">
    <div class="chiprow">
      <button class="chip" onclick="openSort()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg> Giá tổng ↑</button>
      <button class="chip">Tất cả hãng</button>
      <button class="chip">VN</button><button class="chip">VJ</button><button class="chip">QH</button>
    </div>
  </div>

  <div class="screen pad-cta" id="screen">

    <div class="stream" id="streamBanner">
      <span class="dots"><i></i><i></i><i></i></span>
      <span class="txt">Đang ghép cặp · đã có 8 cặp từ 4 nguồn…</span>
      <span class="pbar"><i style="width:70%"></i></span>
    </div>

    <!-- PAIR VIEW -->
    <div id="pairView">
      <div class="resmeta" style="display:flex;align-items:center;justify-content:space-between;padding:6px 16px;"><span class="c" style="font-size:13px;color:var(--apg-text-secondary);"><b>14</b> cặp vé · neo theo chiều đi rẻ nhất</span></div>
      <div id="pairList"></div>
    </div>

    <!-- SPLIT VIEW -->
    <div id="splitView" class="hide">
      <div class="tabbar">
        <button class="on" id="tab-out" onclick="setTab('out')">Chiều đi <span class="chk hide" id="chk-out">✓</span></button>
        <button id="tab-in" onclick="setTab('in')">Chiều về <span class="chk hide" id="chk-in">✓</span></button>
      </div>
      <div id="splitList"></div>
    </div>

    <div style="padding:4px 16px 24px;"><button class="btn tint">Tải thêm 40 cặp</button></div>
  </div>

  <!-- DOCK -->
  <div class="qdock hide" id="qdock">
    <div class="top">
      <div><div class="legs" id="dockLegs">Chiều đi: VJ139 · Chiều về: —</div><div class="tot" id="dockTot">—</div></div>
      <button class="iconbtn" style="color:#9a9aa0" onclick="clearSel()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
    </div>
    <div class="actions"><button class="btn fill" id="dockGo" onclick="location.href='quote.html'">Tiếp tục báo giá</button></div>
  </div>

  <!-- SORT SHEET -->
  <div class="sheet-backdrop" id="sortBackdrop" onclick="closeSort()"></div>
  <div class="sheet" id="sortSheet">
    <div class="handle"></div>
    <div class="shead"><span class="t">Sắp xếp</span><button class="x" onclick="closeSort()">✕</button></div>
    <div class="sbody"><div class="group" style="margin:0 16px;box-shadow:none;border:1px solid var(--apg-hairline);">
      <div class="row"><div class="body"><div class="v">Giá tổng cặp ↑</div></div><span class="trail">✓</span></div>
      <div class="row"><div class="body"><div class="v">Giờ đi chiều đi sớm nhất</div></div></div>
      <div class="row"><div class="body"><div class="v">Giờ đi chiều về sớm nhất</div></div></div>
    </div></div>
  </div>

</div>

<script>
  const ACOL={VN:'#1a3a6b',VJ:'#e30613',QH:'#1f7a4d',VU:'#0a74c0','9G':'#f59e0b'};
  const alogo=(c,sz='sm')=>`<span class="airmono ${sz}" style="background:${ACOL[c]||'#0a74c0'}">${c}</span>`;
  const fmt=n=>n.toLocaleString('vi-VN');

  const OUT=[
    {code:'VJ',name:'VietJet Air',no:'VJ139',dep:'08:15',arr:'10:25',dur:'2g 10m',price:1890000},
    {code:'VN',name:'Vietnam Airlines',no:'VN213',dep:'07:05',arr:'09:20',dur:'1g 25m',price:2450000},
    {code:'QH',name:'Bamboo Airways',no:'QH202',dep:'09:40',arr:'11:50',dur:'2g 10m',price:2150000},
  ];
  const INB=[
    {code:'VJ',name:'VietJet Air',no:'VJ174',dep:'19:30',arr:'21:40',dur:'2g 10m',price:1750000},
    {code:'VN',name:'Vietnam Airlines',no:'VN256',dep:'17:00',arr:'19:15',dur:'2g 15m',price:2380000},
    {code:'QH',name:'Bamboo Airways',no:'QH215',dep:'13:20',arr:'15:30',dur:'2g 10m',price:1980000},
  ];
  const PAIRS=[
    {o:0,i:0,total:3640000,usd:143},{o:2,i:2,total:4130000,usd:162},{o:1,i:1,total:4830000,usd:190},
    {o:0,i:2,total:3870000,usd:152},{o:2,i:0,total:3900000,usd:153},
  ];
  let sel={out:null,in:null},tab='out';

  function pairHTML(p,idx){
    const o=OUT[p.o],i=INB[p.i];
    return `<div class="pair" onclick="selectPair(${idx})">
      <div class="leg"><span class="dir">Đi</span>${alogo(o.code)}<div class="info"><div class="tt"><span class="tnum">${o.dep} → ${o.arr}</span></div><div class="ss">${o.name} ${o.no} · ${o.dur} · 6 Th8</div></div></div>
      <div class="leg"><span class="dir">Về</span>${alogo(i.code)}<div class="info"><div class="tt"><span class="tnum">${i.dep} → ${i.arr}</span></div><div class="ss">${i.name} ${i.no} · ${i.dur} · 10 Th8</div></div></div>
      <div class="foot"><div><div class="tlabel">Tổng cặp · 1 khách</div><div class="price tnum" style="color:var(--apg-blue-600)">${fmt(p.total)} ₫ <span style="font-size:12px;color:var(--apg-text-tertiary);font-weight:500;">≈ ${p.usd}$</span></div></div><button class="btn fill sm" onclick="event.stopPropagation();location.href='quote.html'">Chọn cặp</button></div>
    </div>`;
  }
  function flightRowHTML(f,side,idx){
    return `<div class="fcard" onclick="pickLeg('${side}',${idx})" id="${side}${idx}">
      <div class="top">${alogo(f.code,'')}<div><div class="alname">${f.name}</div><div class="alno mono">${f.no} · ${f.dur}</div></div></div>
      <div class="timeline"><div class="ep"><div class="t tnum">${f.dep}</div><div class="a">${side==='out'?'HAN':'SGN'}</div></div><div class="mid"><div class="dur">${f.dur}</div><div class="path"><span class="line"></span><span class="plane"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 16l9-3 9-3-9-3-9-3 2 6z"/></svg></span></div><div class="stops">Bay thẳng</div></div><div class="ep"><div class="t tnum">${f.arr}</div><div class="a">${side==='out'?'SGN':'HAN'}</div></div></div>
      <div class="bottom"><div class="price tnum">${fmt(f.price)}<span class="cur"> ₫</span></div><button class="btn ${sel[side]===idx?'fill':'tint'} sm">${sel[side]===idx?'Đã chọn ✓':'Chọn'}</button></div>
    </div>`;
  }
  function renderPairs(){document.getElementById('pairList').innerHTML=PAIRS.map((p,i)=>pairHTML(p,i)).join('');}
  function renderSplit(){const arr=tab==='out'?OUT:INB;document.getElementById('splitList').innerHTML=arr.map((f,i)=>flightRowHTML(f,tab,i)).join('');}

  function setView(v){
    document.querySelectorAll('#viewSeg button').forEach((b,i)=>b.classList.toggle('on',(i===0)===(v==='pair')));
    document.getElementById('pairView').classList.toggle('hide',v!=='pair');
    document.getElementById('splitView').classList.toggle('hide',v!=='split');
    if(v==='split')renderSplit();
  }
  function setTab(t){tab=t;document.getElementById('tab-out').classList.toggle('on',t==='out');document.getElementById('tab-in').classList.toggle('on',t==='in');renderSplit();}
  function pickLeg(side,idx){
    sel[side]=idx;renderSplit();updateDock();
    document.getElementById('chk-'+side).classList.remove('hide');
    if(sel.out!==null&&sel.in===null)setTab('in');
  }
  function selectPair(idx){location.href='quote.html';}
  function updateDock(){
    const d=document.getElementById('qdock');
    if(sel.out===null&&sel.in===null){d.classList.add('hide');return;}
    d.classList.remove('hide');
    const o=sel.out!==null?OUT[sel.out]:null,i=sel.in!==null?INB[sel.in]:null;
    document.getElementById('dockLegs').textContent=`Đi: ${o?o.no:'—'} · Về: ${i?i.no:'—'}`;
    const tot=(o?o.price:0)+(i?i.price:0);
    document.getElementById('dockTot').textContent=(o&&i)?fmt(tot)+' ₫':'Chọn đủ 2 chiều';
    document.getElementById('dockGo').classList.toggle('disabled',!(o&&i));
  }
  function clearSel(){sel={out:null,in:null};document.getElementById('chk-out').classList.add('hide');document.getElementById('chk-in').classList.add('hide');renderSplit();updateDock();}
  function openSort(){sortSheet.classList.add('open');sortBackdrop.classList.add('open');}
  function closeSort(){sortSheet.classList.remove('open');sortBackdrop.classList.remove('open');}

  renderPairs();
  setTimeout(()=>{document.getElementById('streamBanner').classList.add('hide');},2600);
</script>
</body>
</html>
